<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trading Bot{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1a1a2e', 900: '#0f0f23', 700: '#252547' },
                        accent: { 500: '#6366f1', 600: '#4f46e5' },
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .pulse-green { animation: pulse-green 2s infinite; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen flex">
    {% include "components/navbar.html" %}

    <main class="flex-1 ml-60 p-6 overflow-auto">
        <div class="max-w-7xl mx-auto">
            <div class="mb-6">
                <h1 class="text-2xl font-bold">{% block page_title %}Dashboard{% endblock %}</h1>
                <p class="text-gray-400 text-sm">{% block breadcrumb %}Home{% endblock %}</p>
            </div>
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
