<div class="bg-dark-700 rounded-lg p-4" x-data="liveLog()" x-init="fetchLogs()">
    <a href="/logs" class="flex justify-between items-center mb-2 group">
        <h3 class="text-sm font-bold text-gray-300 group-hover:text-accent-400 transition-colors">Live Log</h3>
        <span class="text-xs text-gray-500 group-hover:text-accent-400 transition-colors">View all &rarr;</span>
    </a>
    <div class="h-64 overflow-y-auto scrollbar-thin space-y-1 font-mono text-xs" x-ref="logContainer">
        <template x-for="log in logs" :key="log.id">
            <a :href="'/logs?level='+log.level+'&component='+log.component"
               class="flex gap-2 hover:bg-dark-600 rounded px-1 -mx-1 cursor-pointer">
                <span class="text-gray-500 whitespace-nowrap" x-text="log.timestamp.slice(11,19)"></span>
                <span class="font-bold"
                    :class="{
                        'text-blue-400': log.level==='INFO',
                        'text-yellow-400': log.level==='WARNING',
                        'text-red-400': log.level==='ERROR'
                    }"
                    x-text="log.level"></span>
                <span class="text-gray-400" x-text="'['+log.component+']'"></span>
                <span class="text-gray-200" x-text="log.message"></span>
            </a>
        </template>
    </div>
</div>

<script>
function liveLog() {
    return {
        logs: [],
        async fetchLogs() {
            try {
                const r = await fetch('/api/logs?limit=20');
                this.logs = (await r.json()).reverse();
                this.$nextTick(() => {
                    const c = this.$refs.logContainer;
                    if (c) c.scrollTop = c.scrollHeight;
                });
            } catch(e) {}
            setTimeout(() => this.fetchLogs(), 5000);
        }
    }
}
</script>
