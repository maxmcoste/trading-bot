<div class="bg-dark-700 rounded-lg p-3" x-data="{ signal: '{{ signal.signal }}', strength: {{ signal.strength }}, symbol: '{{ signal.symbol }}' }">
    <div class="flex justify-between items-center mb-1">
        <span class="font-semibold text-sm">{{ signal.symbol }}</span>
        <span class="px-2 py-0.5 rounded text-xs font-bold"
            :class="{
                'bg-green-700 text-green-100': signal === 'bullish',
                'bg-red-700 text-red-100': signal === 'bearish',
                'bg-gray-600 text-gray-200': signal === 'neutral'
            }"
            x-text="signal === 'bullish' ? 'BUY' : signal === 'bearish' ? 'SELL' : 'HOLD'">
        </span>
    </div>
    <div class="w-full bg-gray-700 rounded-full h-2">
        <div class="h-2 rounded-full transition-all duration-500"
             :class="{
                'bg-green-500': signal === 'bullish',
                'bg-red-500': signal === 'bearish',
                'bg-gray-500': signal === 'neutral'
             }"
             :style="'width: ' + (strength * 100) + '%'">
        </div>
    </div>
    <span class="text-xs text-gray-400" x-text="(strength * 100).toFixed(0) + '% confidence'"></span>
</div>
